<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis Jams</title>
  <style>
    :root {
      --bg: #0d0015;
      --surface: #160028;
      --surface-up: #220038;
      --border: #3a005a;
      --text: #f0e6ff;
      --text-muted: #7050a0;
      --pink: #ff71ce;
      --cyan: #01cdfe;
      --purple: #b967ff;
      --yellow: #fffb96;
      --green: #05ffa1;
      --glow-pink: rgba(255,113,206,0.45);
      --glow-cyan: rgba(1,205,254,0.45);
      --glow-purple: rgba(185,103,255,0.4);
      --radius: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono','Fira Code','Consolas',monospace;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    /* retro grid overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(185,103,255,0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(185,103,255,0.06) 1px, transparent 1px);
      background-size: 44px 44px;
      pointer-events: none;
      z-index: 0;
    }
    /* top glow halo */
    body::after {
      content: '';
      position: fixed;
      top: -80px; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 260px;
      background: radial-gradient(ellipse, rgba(255,113,206,0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    header, main { position: relative; z-index: 1; }

    /* ─── Header ─── */
    header {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(13,0,21,0.9);
      box-shadow: 0 1px 24px rgba(255,113,206,0.12);
    }
    .logo {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--pink) 0%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tabs { display: flex; gap: 4px; margin-left: auto; }
    .tab-btn {
      padding: 6px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font: inherit;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    .tab-btn:hover { color: var(--pink); border-color: var(--pink); }
    .tab-btn.active {
      background: rgba(255,113,206,0.12);
      color: var(--pink);
      border-color: var(--pink);
      box-shadow: 0 0 10px rgba(255,113,206,0.25);
    }

    /* ─── Layout ─── */
    main { flex: 1; padding: 24px; max-width: 1120px; width: 100%; margin: 0 auto; }
    .panel { display: none; }
    .panel.active { display: block; }

    /* ─── Controls ─── */
    .ctrl-row {
      display: flex; align-items: center; gap: 16px;
      flex-wrap: wrap; margin-bottom: 16px;
    }
    .ctrl-group { display: flex; align-items: center; gap: 8px; }
    .ctrl-label {
      color: var(--text-muted); font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.08em; white-space: nowrap;
    }
    .separator { width: 1px; height: 20px; background: var(--border); }

    /* ─── Buttons ─── */
    .btn {
      padding: 7px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface-up);
      color: var(--text);
      cursor: pointer; font: inherit; font-size: 12px;
      transition: all 0.12s;
    }
    .btn:hover { border-color: var(--pink); color: var(--pink); box-shadow: 0 0 8px rgba(255,113,206,0.2); }
    .btn:active { transform: scale(0.97); }
    .btn.primary {
      background: rgba(255,113,206,0.12); border-color: var(--pink); color: var(--pink);
    }
    .btn.primary:hover { background: var(--pink); color: #0d0015; box-shadow: 0 0 16px var(--glow-pink); }
    .btn.cyan {
      background: rgba(1,205,254,0.1); border-color: var(--cyan); color: var(--cyan);
    }
    .btn.cyan:hover { background: var(--cyan); color: #0d0015; box-shadow: 0 0 16px var(--glow-cyan); }
    .btn.danger { border-color: #ff4466; color: #ff4466; }
    .btn.danger:hover { background: #ff4466; color: #fff; }
    .btn.sm { padding: 4px 10px; font-size: 11px; }

    /* ─── Inputs ─── */
    select, input[type="text"] {
      background: var(--surface-up); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font: inherit; font-size: 12px; padding: 6px 10px;
    }
    select:focus, input[type="text"]:focus { outline: none; border-color: var(--pink); }
    input[type="range"] { accent-color: var(--pink); cursor: pointer; width: 120px; }
    .bpm-display {
      font-size: 18px; font-weight: 700; color: var(--pink);
      min-width: 44px; text-align: center; text-shadow: 0 0 10px var(--glow-pink);
    }

    /* ─── Beat Machine grid ─── */
    .beat-grid-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; overflow-x: auto;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
    }
    .beat-grid { display: grid; gap: 3px; min-width: max-content; }
    .row-label {
      display: flex; align-items: center; color: var(--text-muted);
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em;
      padding-right: 8px; white-space: nowrap; justify-content: flex-end;
      user-select: none;
    }
    .step-btn {
      width: 36px; height: 36px; border-radius: 4px; border: none;
      cursor: pointer; background: var(--surface-up);
      transition: background 0.08s, box-shadow 0.08s;
    }
    .step-btn:hover { background: #350055; }
    .step-btn.active {
      background: var(--pink);
      box-shadow: 0 0 8px var(--glow-pink);
    }
    .step-btn.playing {
      outline: 2px solid var(--cyan);
      outline-offset: -2px;
      box-shadow: 0 0 12px var(--glow-cyan);
    }

    .patterns-bar {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      padding: 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius);
    }

    /* ─── Tuner ─── */
    .strings-row { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .string-card {
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px 20px; cursor: pointer;
      transition: all 0.15s; min-width: 90px; user-select: none;
    }
    .string-card:hover { border-color: var(--purple); box-shadow: 0 0 10px var(--glow-purple); }
    .string-card.playing {
      border-color: var(--cyan); background: rgba(1,205,254,0.08);
      box-shadow: 0 0 16px var(--glow-cyan);
    }
    .string-num { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
    .string-note { font-size: 26px; font-weight: 700; color: var(--cyan); line-height: 1; text-shadow: 0 0 12px var(--glow-cyan); }
    .string-hz { font-size: 11px; color: var(--text-muted); }
    .play-indicator { font-size: 14px; opacity: 0; transition: opacity 0.15s; color: var(--cyan); }
    .string-card.playing .play-indicator { opacity: 1; }

    .tuner-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
    }
    .tuner-section h3 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted); margin-bottom: 12px;
    }
    .custom-strings { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap: 8px; }
    .custom-string-row {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface-up); border-radius: var(--radius); padding: 6px 10px;
    }
    .custom-string-row .string-name { color: var(--text-muted); font-size: 11px; min-width: 50px; }
    .custom-string-row select { padding: 3px 6px; font-size: 11px; }
    .custom-string-row .hz-preview { color: var(--cyan); font-size: 11px; min-width: 66px; text-align: right; }
    .saved-tunings { display: flex; gap: 8px; flex-wrap: wrap; }
    .saved-tuning-chip {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface-up); border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 12px; font-size: 11px;
      cursor: pointer; transition: all 0.12s;
    }
    .saved-tuning-chip:hover { border-color: var(--cyan); color: var(--cyan); }
    .saved-tuning-chip .del { color: var(--text-muted); font-size: 10px; cursor: pointer; }
    .saved-tuning-chip .del:hover { color: #ff4466; }
    .tone-toggle { display: flex; gap: 6px; }
    .tone-opt {
      padding: 5px 10px; border-radius: var(--radius); border: 1px solid var(--border);
      font-size: 11px; cursor: pointer; transition: all 0.12s;
    }
    .tone-opt.active { border-color: var(--cyan); color: var(--cyan); background: rgba(1,205,254,0.1); }

    /* ─── Tone Generator ─── */
    .synth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }
    @media (max-width: 700px) { .synth-grid { grid-template-columns: 1fr; } }
    .synth-module {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .synth-module h3 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--pink); margin-bottom: 14px;
      text-shadow: 0 0 8px var(--glow-pink);
    }
    .knob-row { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }

    /* ─── Knob component ─── */
    .knob {
      display: flex; flex-direction: column; align-items: center;
      gap: 5px; cursor: ns-resize; user-select: none;
    }
    .knob-ring {
      width: 54px; height: 54px; border-radius: 50%;
      background: radial-gradient(circle at 38% 33%, #2e0050, #130020);
      border: 1.5px solid rgba(255,113,206,0.35);
      box-shadow: 0 0 8px rgba(255,113,206,0.15), inset 0 1px 3px rgba(0,0,0,0.6);
      position: relative;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .knob-ring:hover, .knob.dragging .knob-ring {
      border-color: var(--pink);
      box-shadow: 0 0 14px var(--glow-pink), inset 0 1px 3px rgba(0,0,0,0.6);
    }
    /* range arc track (cosmetic) */
    .knob-ring::before {
      content: '';
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 2px solid transparent;
      border-bottom-color: rgba(255,113,206,0.1);
      border-left-color: rgba(255,113,206,0.1);
      transform: rotate(-45deg);
    }
    .knob-indicator {
      position: absolute;
      width: 3px; height: 18px;
      top: 8px; left: calc(50% - 1.5px);
      background: linear-gradient(to bottom, var(--pink), rgba(255,113,206,0.3));
      border-radius: 2px 2px 0 0;
      box-shadow: 0 0 6px var(--pink);
      transform-origin: 50% 100%;
    }
    /* center dot */
    .knob-ring::after {
      content: '';
      position: absolute;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--surface);
      border: 1px solid rgba(255,113,206,0.25);
      top: 50%; left: 50%;
      transform: translate(-50%,-50%);
    }
    .knob-lbl {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted); text-align: center;
    }
    .knob-val {
      font-size: 10px; color: var(--cyan); min-width: 44px;
      text-align: center; font-weight: 600;
    }

    /* ─── Wave selector ─── */
    .wave-selector { display: flex; gap: 8px; margin-bottom: 16px; }
    .wave-btn {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 5px; padding: 8px 6px;
      background: var(--surface-up); border: 1px solid var(--border);
      border-radius: var(--radius); cursor: pointer; transition: all 0.12s;
    }
    .wave-btn:hover { border-color: var(--purple); }
    .wave-btn.active {
      border-color: var(--pink); background: rgba(255,113,206,0.1);
      box-shadow: 0 0 10px rgba(255,113,206,0.2);
    }
    .wave-btn svg { width: 44px; height: 22px; }
    .wave-btn.active svg { stroke: var(--pink); filter: drop-shadow(0 0 4px var(--pink)); }
    .wave-btn svg { stroke: var(--text-muted); }
    .wave-btn span { font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }
    .wave-btn.active span { color: var(--pink); }

    /* ─── Filter type selector ─── */
    .filter-type { display: flex; gap: 6px; margin-bottom: 14px; }
    .ftype-btn {
      padding: 4px 12px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface-up);
      color: var(--text-muted); cursor: pointer; font: inherit; font-size: 11px;
      transition: all 0.12s;
    }
    .ftype-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(1,205,254,0.1); }

    /* ─── LFO target ─── */
    .lfo-target { display: flex; gap: 6px; margin-bottom: 14px; }
    .ltarget-btn {
      padding: 4px 10px; border-radius: var(--radius);
      border: 1px solid var(--border); background: var(--surface-up);
      color: var(--text-muted); cursor: pointer; font: inherit; font-size: 11px;
      transition: all 0.12s;
    }
    .ltarget-btn.active { border-color: var(--purple); color: var(--purple); background: rgba(185,103,255,0.1); }

    /* ─── Oscilloscope ─── */
    .scope-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 12px; margin-bottom: 14px;
    }
    .scope-wrap h3 {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--cyan); margin-bottom: 10px; text-shadow: 0 0 8px var(--glow-cyan);
    }
    #tgScope {
      display: block; width: 100%; height: 80px;
      background: #050010; border-radius: 4px;
    }

    /* ─── Tone gen play button ─── */
    .tg-play-row { display: flex; align-items: center; justify-content: center; gap: 16px; padding: 8px 0; }
    #tgPlayBtn {
      padding: 10px 36px; font-size: 14px; letter-spacing: 0.06em;
      border-radius: var(--radius);
      border: 1.5px solid var(--cyan); background: rgba(1,205,254,0.1);
      color: var(--cyan); cursor: pointer; font: inherit;
      transition: all 0.15s; text-transform: uppercase;
    }
    #tgPlayBtn:hover { background: var(--cyan); color: #0d0015; box-shadow: 0 0 20px var(--glow-cyan); }
    #tgPlayBtn.playing {
      background: var(--cyan); color: #0d0015;
      box-shadow: 0 0 24px var(--glow-cyan);
    }

    /* ─── Tone cards ─── */
    .tone-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 12px;
    }
    .tone-card-hdr {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; background: var(--surface-up);
      border-bottom: 1px solid var(--border);
    }
    .tone-card-name {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--cyan); text-shadow: 0 0 8px var(--glow-cyan); margin-right: auto;
    }
    .tone-play-btn { background: rgba(255,113,206,0.1); border-color: var(--pink); color: var(--pink); }
    .tone-play-btn:hover { background: var(--pink); color: #0d0015; box-shadow: 0 0 14px var(--glow-pink); }
    .tone-play-btn.playing {
      background: rgba(1,205,254,0.12) !important; border-color: var(--cyan) !important;
      color: var(--cyan) !important; box-shadow: 0 0 12px var(--glow-cyan) !important;
    }
    .tone-card-body { padding: 12px; }
    .tone-card .synth-module { background: rgba(0,0,0,0.2); }

    /* ─── Knob inline edit ─── */
    .knob-val { cursor: text; }
    .knob-val:hover { color: var(--pink); }
    .knob-edit {
      width: 46px; font: inherit; font-size: 10px; font-weight: 600;
      background: var(--surface); border: 1px solid var(--pink);
      color: var(--cyan); border-radius: 3px; text-align: center;
      padding: 1px 2px; outline: none;
    }

    /* ─── Octave stepper ─── */
    .octave-stepper {
      display: flex; align-items: center; gap: 3px; margin-bottom: 10px;
    }
    .oct-lbl {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted); margin-right: 4px; white-space: nowrap;
    }
    .oct-btn {
      flex: 1; padding: 3px 0; font: inherit; font-size: 10px;
      text-align: center; background: var(--surface-up);
      border: 1px solid var(--border); border-radius: 4px;
      cursor: pointer; color: var(--text-muted); transition: all 0.1s;
    }
    .oct-btn:hover { border-color: var(--purple); color: var(--purple); }
    .oct-btn.active {
      background: rgba(185,103,255,0.15); border-color: var(--purple);
      color: var(--purple); box-shadow: 0 0 6px var(--glow-purple);
    }
    .tone-card .synth-grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
  </style>
</head>
<body>

<header>
  <div class="logo">Jarvis Jams</div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="beat">Beat Machine</button>
    <button class="tab-btn" data-tab="tuner">Tuner</button>
    <button class="tab-btn" data-tab="tone">Tone Gen</button>
  </div>
</header>

<main>

  <!-- ═══ BEAT MACHINE ═══ -->
  <div class="panel active" id="panel-beat">
    <div class="ctrl-row">
      <div class="ctrl-group">
        <button class="btn primary" id="playBtn">▶ Play</button>
        <button class="btn" id="stopBtn">■ Stop</button>
      </div>
      <div class="separator"></div>
      <div class="ctrl-group">
        <span class="ctrl-label">BPM</span>
        <input type="range" id="bpmSlider" min="40" max="300" value="120">
        <div class="bpm-display" id="bpmDisplay">120</div>
        <button class="btn sm" id="tapBtn">Tap</button>
      </div>
    </div>
    <div class="ctrl-row" style="margin-bottom:20px">
      <div class="ctrl-group">
        <span class="ctrl-label">Beats</span>
        <select id="beatsSelect">
          <option value="2">2</option><option value="3">3</option>
          <option value="4" selected>4</option><option value="5">5</option>
          <option value="6">6</option><option value="7">7</option><option value="8">8</option>
        </select>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">Resolution</span>
        <select id="resSelect">
          <option value="1">1/4</option><option value="2">1/8</option>
          <option value="4" selected>1/16</option><option value="8">1/32</option>
        </select>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-label">Swing</span>
        <input type="range" id="swingSlider" min="0" max="100" value="0">
        <span id="swingDisplay" style="min-width:32px;color:var(--pink)">0%</span>
      </div>
    </div>
    <div style="margin-bottom:16px">
      <div class="beat-grid-wrap">
        <div class="beat-grid" id="beatGrid"></div>
      </div>
    </div>
    <div class="patterns-bar">
      <span class="ctrl-label">Pattern</span>
      <select id="patternSelect" style="min-width:140px"></select>
      <button class="btn sm" id="patternSaveBtn">Save</button>
      <button class="btn sm" id="patternNewBtn">New</button>
      <button class="btn sm" id="patternDupBtn">Duplicate</button>
      <button class="btn sm danger" id="patternClearBtn">Clear</button>
      <div class="separator"></div>
      <button class="btn sm cyan" id="exportWavBtn">Export WAV</button>
    </div>
  </div>

  <!-- ═══ TUNER ═══ -->
  <div class="panel" id="panel-tuner">
    <div class="ctrl-row" style="margin-bottom:20px">
      <div class="ctrl-group">
        <span class="ctrl-label">Preset</span>
        <select id="presetSelect"></select>
      </div>
      <div class="separator"></div>
      <div class="ctrl-group">
        <span class="ctrl-label">Tone</span>
        <div class="tone-toggle">
          <div class="tone-opt active" data-mode="sine" id="toneSine">○ Sine</div>
          <div class="tone-opt" data-mode="guitar" id="toneGuitar">♩ Guitar</div>
        </div>
      </div>
      <div class="separator"></div>
      <div class="ctrl-group">
        <span class="ctrl-label">Sustain</span>
        <div class="tone-opt" id="sustainToggle">Hold</div>
      </div>
      <div style="margin-left:auto;color:var(--text-muted);font-size:11px">
        Click a string to play · click again to stop
      </div>
    </div>
    <div class="strings-row" id="stringsRow"></div>
    <div class="tuner-section">
      <h3>Edit Tuning</h3>
      <div class="custom-strings" id="customStrings"></div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="text" id="tuningNameInput" placeholder="Tuning name…" style="width:180px">
        <button class="btn sm primary" id="saveTuningBtn">Save Tuning</button>
        <button class="btn sm" id="exportTuningBtn">Export JSON</button>
      </div>
    </div>
    <div class="tuner-section">
      <h3>Saved Tunings</h3>
      <div class="saved-tunings" id="savedTunings"></div>
      <div id="noSavedTunings" style="color:var(--text-muted);font-size:12px">No saved tunings yet.</div>
    </div>
  </div>

  <!-- ═══ TONE GENERATOR ═══ -->
  <div class="panel" id="panel-tone">

    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="btn cyan" id="tgAddTone">+ Add Tone</button>
    </div>
    <div id="tgTones"></div>

    <!-- SCOPE -->
    <div class="scope-wrap">
      <h3>Oscilloscope</h3>
      <canvas id="tgScope"></canvas>
    </div>

  </div><!-- /panel-tone -->

</main>

<script>
'use strict';

// ═════════════════════════════════════════
// AUDIO CONTEXT
// ═════════════════════════════════════════
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new AudioContext();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ═════════════════════════════════════════
// DRUM SYNTHESIS
// ═════════════════════════════════════════
function noiseBuffer(ctx, dur) {
  const n = Math.ceil(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, n, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}
function playKick(ctx, t) {
  const g = ctx.createGain(); g.gain.setValueAtTime(1,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.5); g.connect(ctx.destination);
  const osc = ctx.createOscillator(); osc.frequency.setValueAtTime(160,t); osc.frequency.exponentialRampToValueAtTime(0.001,t+0.5); osc.connect(g); osc.start(t); osc.stop(t+0.5);
  const ng = ctx.createGain(); ng.gain.setValueAtTime(0.5,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.06);
  const nb = ctx.createBufferSource(); nb.buffer = noiseBuffer(ctx,0.06);
  const nf = ctx.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=300;
  nb.connect(nf); nf.connect(ng); ng.connect(ctx.destination); nb.start(t);
}
function playSnare(ctx, t) {
  const ng = ctx.createGain(); ng.gain.setValueAtTime(0.8,t); ng.gain.exponentialRampToValueAtTime(0.001,t+0.2);
  const nb = ctx.createBufferSource(); nb.buffer = noiseBuffer(ctx,0.2);
  const nf = ctx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=900; nf.Q.value=0.8;
  nb.connect(nf); nf.connect(ng); ng.connect(ctx.destination); nb.start(t);
  const og = ctx.createGain(); og.gain.setValueAtTime(0.5,t); og.gain.exponentialRampToValueAtTime(0.001,t+0.1);
  const osc = ctx.createOscillator(); osc.type='triangle'; osc.frequency.value=220; osc.connect(og); og.connect(ctx.destination); osc.start(t); osc.stop(t+0.1);
}
function playHiHat(ctx, t, open) {
  const dur = open ? 0.28 : 0.045;
  const g = ctx.createGain(); g.gain.setValueAtTime(0.7,t); g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  const nb = ctx.createBufferSource(); nb.buffer = noiseBuffer(ctx,dur);
  const hpf = ctx.createBiquadFilter(); hpf.type='highpass'; hpf.frequency.value=7000;
  nb.connect(hpf); hpf.connect(g); g.connect(ctx.destination); nb.start(t);
}
function playClap(ctx, t) {
  [0,0.010,0.020,0.032].forEach(o => {
    const g = ctx.createGain(); g.gain.setValueAtTime(0.45,t+o); g.gain.exponentialRampToValueAtTime(0.001,t+o+0.12);
    const nb = ctx.createBufferSource(); nb.buffer = noiseBuffer(ctx,0.12);
    const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1100; f.Q.value=0.7;
    nb.connect(f); f.connect(g); g.connect(ctx.destination); nb.start(t+o);
  });
}
function playTom(ctx, t) {
  const g = ctx.createGain(); g.gain.setValueAtTime(0.9,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.35); g.connect(ctx.destination);
  const osc = ctx.createOscillator(); osc.frequency.setValueAtTime(90,t); osc.frequency.exponentialRampToValueAtTime(45,t+0.35); osc.connect(g); osc.start(t); osc.stop(t+0.35);
}
function playRim(ctx, t) {
  const g = ctx.createGain(); g.gain.setValueAtTime(0.5,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
  const osc = ctx.createOscillator(); osc.type='square'; osc.frequency.value=1800;
  const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1800; f.Q.value=3;
  osc.connect(f); f.connect(g); g.connect(ctx.destination); osc.start(t); osc.stop(t+0.05);
}
function playCowbell(ctx, t) {
  [562,845].forEach(freq => {
    const g = ctx.createGain(); g.gain.setValueAtTime(0.35,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.55);
    const osc = ctx.createOscillator(); osc.type='square'; osc.frequency.value=freq;
    const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=700; f.Q.value=1;
    osc.connect(f); f.connect(g); g.connect(ctx.destination); osc.start(t); osc.stop(t+0.55);
  });
}
const INSTRUMENTS = [
  { name:'Kick',     play: playKick },
  { name:'Snare',    play: playSnare },
  { name:'Hi-Hat',   play: (c,t) => playHiHat(c,t,false) },
  { name:'Open Hat', play: (c,t) => playHiHat(c,t,true) },
  { name:'Clap',     play: playClap },
  { name:'Tom',      play: playTom },
  { name:'Rim',      play: playRim },
  { name:'Cowbell',  play: playCowbell },
];
const NUM_ROWS = INSTRUMENTS.length;

// ═════════════════════════════════════════
// BEAT MACHINE
// ═════════════════════════════════════════
let bpm=120, beatsPerMeasure=4, stepsPerBeat=4, swingPct=0;
let grid=[], stepBtns=[], totalSteps=16;
let isPlaying=false, currentStep=0, prevPlayStep=-1, nextNoteTime=0;
let schedulerTimer=null, animFrame=null, tapTimes=[];
const LOOKAHEAD=0.1, SCHED_INTERVAL=25;

function initGrid(rows,steps){
  const g=[];
  for(let r=0;r<rows;r++){g[r]=[];for(let s=0;s<steps;s++)g[r][s]=(grid[r]&&grid[r][s])||false;}
  grid=g; totalSteps=steps;
}
function getStepDuration(i){
  const base=(60/bpm)/stepsPerBeat;
  if(!swingPct||stepsPerBeat<2) return base;
  const pair=base*2, ratio=0.5+(swingPct/100)*0.22;
  return i%2===0 ? pair*ratio : pair*(1-ratio);
}
function scheduleStep(step,t){ const ctx=getCtx(); for(let r=0;r<NUM_ROWS;r++) if(grid[r][step]) INSTRUMENTS[r].play(ctx,t); }
function advance(){ nextNoteTime+=getStepDuration(currentStep); currentStep=(currentStep+1)%totalSteps; }
function scheduler(){ const ctx=getCtx(); while(nextNoteTime<ctx.currentTime+LOOKAHEAD){scheduleStep(currentStep,nextNoteTime);advance();} schedulerTimer=setTimeout(scheduler,SCHED_INTERVAL); }
function updatePlayhead(){
  if(!isPlaying) return;
  const s=currentStep;
  if(s!==prevPlayStep){
    if(prevPlayStep>=0) for(let r=0;r<NUM_ROWS;r++) stepBtns[r]?.[prevPlayStep]?.classList.remove('playing');
    for(let r=0;r<NUM_ROWS;r++) stepBtns[r]?.[s]?.classList.add('playing');
    prevPlayStep=s;
  }
  animFrame=requestAnimationFrame(updatePlayhead);
}
function play(){ const ctx=getCtx(); isPlaying=true; currentStep=0; nextNoteTime=ctx.currentTime+0.05; prevPlayStep=-1; scheduler(); animFrame=requestAnimationFrame(updatePlayhead); document.getElementById('playBtn').textContent='▶ Playing'; }
function stop(){ isPlaying=false; clearTimeout(schedulerTimer); cancelAnimationFrame(animFrame); for(let r=0;r<NUM_ROWS;r++) stepBtns[r]?.forEach(b=>b?.classList.remove('playing')); prevPlayStep=-1; document.getElementById('playBtn').textContent='▶ Play'; }

function renderGrid(){
  const wrap=document.getElementById('beatGrid'); wrap.innerHTML=''; stepBtns=[];
  wrap.style.gridTemplateColumns=`70px repeat(${totalSteps},1fr)`;
  for(let r=0;r<NUM_ROWS;r++){
    stepBtns[r]=[];
    const lbl=document.createElement('div'); lbl.className='row-label'; lbl.textContent=INSTRUMENTS[r].name; wrap.appendChild(lbl);
    for(let s=0;s<totalSteps;s++){
      const btn=document.createElement('button'); btn.className='step-btn'+(grid[r][s]?' active':'');
      btn.addEventListener('click',()=>{ grid[r][s]=!grid[r][s]; btn.classList.toggle('active',grid[r][s]); markPatternDirty(); });
      wrap.appendChild(btn); stepBtns[r][s]=btn;
    }
  }
  const sz=totalSteps>24?26:totalSteps>16?32:36;
  document.querySelectorAll('.step-btn').forEach(b=>{b.style.width=sz+'px';b.style.height=sz+'px';});
}
function rebuildGrid(){ totalSteps=beatsPerMeasure*stepsPerBeat; initGrid(NUM_ROWS,totalSteps); renderGrid(); }

// Patterns
let patterns={}, currentPatternKey=null, patternDirty=false;
function markPatternDirty(){ patternDirty=true; const sel=document.getElementById('patternSelect'); const opt=sel.options[sel.selectedIndex]; if(opt&&!opt.text.endsWith('*'))opt.text+=` *`; }
function gridSnapshot(){ return grid.map(r=>[...r]); }
function applySnapshot(snap){ for(let r=0;r<NUM_ROWS;r++) for(let s=0;s<totalSteps;s++) grid[r][s]=(snap[r]&&snap[r][s])||false; renderGrid(); }
function saveCurrentPattern(name){ patterns[name]={grid:gridSnapshot(),bpm,beatsPerMeasure,stepsPerBeat,swingPct}; localStorage.setItem('jj-patterns',JSON.stringify(patterns)); return name; }
function loadPattern(key){ const p=patterns[key]; if(!p) return; bpm=p.bpm;beatsPerMeasure=p.beatsPerMeasure;stepsPerBeat=p.stepsPerBeat;swingPct=p.swingPct; syncTimingUI(); totalSteps=beatsPerMeasure*stepsPerBeat; initGrid(NUM_ROWS,totalSteps); applySnapshot(p.grid); currentPatternKey=key; patternDirty=false; }
function syncTimingUI(){ document.getElementById('bpmSlider').value=bpm; document.getElementById('bpmDisplay').textContent=bpm; document.getElementById('beatsSelect').value=beatsPerMeasure; document.getElementById('resSelect').value=stepsPerBeat; document.getElementById('swingSlider').value=swingPct; document.getElementById('swingDisplay').textContent=swingPct+'%'; }
function loadPatterns(){ try{patterns=JSON.parse(localStorage.getItem('jj-patterns'))||{};}catch{patterns={};} renderPatternList(); }
function renderPatternList(){ const sel=document.getElementById('patternSelect'); sel.innerHTML=''; const keys=Object.keys(patterns); if(!keys.length){const o=document.createElement('option');o.value='';o.textContent='Unsaved';sel.appendChild(o);return;} keys.forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=k;sel.appendChild(o);}); currentPatternKey=sel.value; }

// WAV export
function encodeWAV(buf){ const nCh=2,sr=buf.sampleRate,nS=buf.length,dSz=nS*nCh*2,ab=new ArrayBuffer(44+dSz),v=new DataView(ab); const ws=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));}; ws(0,'RIFF');v.setUint32(4,36+dSz,true);ws(8,'WAVE');ws(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,nCh,true);v.setUint32(24,sr,true);v.setUint32(28,sr*nCh*2,true);v.setUint16(32,nCh*2,true);v.setUint16(34,16,true);ws(36,'data');v.setUint32(40,dSz,true); let off=44; const L=buf.getChannelData(0),R=buf.numberOfChannels>1?buf.getChannelData(1):L; for(let i=0;i<nS;i++){const l=Math.max(-1,Math.min(1,L[i])),r=Math.max(-1,Math.min(1,R[i]));v.setInt16(off,l<0?l*0x8000:l*0x7FFF,true);off+=2;v.setInt16(off,r<0?r*0x8000:r*0x7FFF,true);off+=2;} return ab; }
async function exportWAV(){ let dur=0; for(let s=0;s<totalSteps;s++) dur+=getStepDuration(s); const oc=new OfflineAudioContext(2,Math.ceil((dur+0.6)*44100),44100); let t=0; for(let s=0;s<totalSteps;s++){for(let r=0;r<NUM_ROWS;r++) if(grid[r][s]) INSTRUMENTS[r].play(oc,t); t+=getStepDuration(s);} const rendered=await oc.startRendering(); const wav=encodeWAV(rendered); const blob=new Blob([wav],{type:'audio/wav'}); const url=URL.createObjectURL(blob); Object.assign(document.createElement('a'),{href:url,download:'jarvis-jams.wav'}).click(); setTimeout(()=>URL.revokeObjectURL(url),5000); }

function initBeatMachine(){
  rebuildGrid(); loadPatterns();
  document.getElementById('playBtn').addEventListener('click',()=>{ if(isPlaying)stop();else play(); });
  document.getElementById('stopBtn').addEventListener('click',stop);
  const bpmSl=document.getElementById('bpmSlider');
  bpmSl.addEventListener('input',()=>{ bpm=+bpmSl.value; document.getElementById('bpmDisplay').textContent=bpm; });
  document.getElementById('tapBtn').addEventListener('click',()=>{ const now=performance.now(); tapTimes=tapTimes.filter(t=>now-t<3000); tapTimes.push(now); if(tapTimes.length>=2){const d=tapTimes.slice(1).map((t,i)=>t-tapTimes[i]); bpm=Math.round(Math.min(300,Math.max(40,60000/(d.reduce((a,b)=>a+b,0)/d.length)))); bpmSl.value=bpm; document.getElementById('bpmDisplay').textContent=bpm;} if(tapTimes.length>8)tapTimes.shift(); });
  document.getElementById('beatsSelect').addEventListener('change',e=>{ beatsPerMeasure=+e.target.value; rebuildGrid(); });
  document.getElementById('resSelect').addEventListener('change',e=>{ stepsPerBeat=+e.target.value; rebuildGrid(); });
  const swSl=document.getElementById('swingSlider'); swSl.addEventListener('input',()=>{ swingPct=+swSl.value; document.getElementById('swingDisplay').textContent=swingPct+'%'; });
  document.getElementById('patternSaveBtn').addEventListener('click',()=>{ const sel=document.getElementById('patternSelect'); const name=prompt('Pattern name:',currentPatternKey||'Pattern 1')||''; if(!name)return; saveCurrentPattern(name); currentPatternKey=name; patternDirty=false; renderPatternList(); sel.value=name; });
  document.getElementById('patternNewBtn').addEventListener('click',()=>{ const name=prompt('New pattern name:','Pattern '+(Object.keys(patterns).length+1)); if(!name)return; grid=Array.from({length:NUM_ROWS},()=>Array(totalSteps).fill(false)); saveCurrentPattern(name); currentPatternKey=name; patternDirty=false; renderPatternList(); document.getElementById('patternSelect').value=name; renderGrid(); });
  document.getElementById('patternDupBtn').addEventListener('click',()=>{ const name=prompt('Duplicate as:',(currentPatternKey||'Pattern')+' Copy'); if(!name)return; saveCurrentPattern(name); currentPatternKey=name; patternDirty=false; renderPatternList(); document.getElementById('patternSelect').value=name; });
  document.getElementById('patternClearBtn').addEventListener('click',()=>{ if(!confirm('Clear all steps?'))return; grid=Array.from({length:NUM_ROWS},()=>Array(totalSteps).fill(false)); renderGrid(); markPatternDirty(); });
  document.getElementById('patternSelect').addEventListener('change',e=>{ if(patternDirty&&!confirm('Discard unsaved changes?')){e.target.value=currentPatternKey;return;} loadPattern(e.target.value); });
  document.getElementById('exportWavBtn').addEventListener('click',exportWAV);
}

// ═════════════════════════════════════════
// TUNER
// ═════════════════════════════════════════
const NOTE_NAMES=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
function midiToFreq(m){ return 440*Math.pow(2,(m-69)/12); }
function midiToNote(m){ return NOTE_NAMES[m%12]+(Math.floor(m/12)-1); }
function noteOctToMidi(n,o){ return (o+1)*12+n; }
const PRESETS={ 'Standard':[40,45,50,55,59,64],'Drop D':[38,45,50,55,59,64],'Open G':[38,43,50,55,59,62],'Open D':[38,45,50,54,57,62],'DADGAD':[38,45,50,55,57,62],'Drop C':[36,43,48,53,57,62],'Half-step down':[39,44,49,54,58,63],'Full-step down':[38,43,48,53,57,62] };
let tunerMidis=[...PRESETS['Standard']], toneMode='sine', tunerSustain=false, activeTones=Array(6).fill(null), savedTunings={};
function loadSavedTunings(){ try{savedTunings=JSON.parse(localStorage.getItem('jj-tunings'))||{};}catch{savedTunings={};} }
function persistTunings(){ localStorage.setItem('jj-tunings',JSON.stringify(savedTunings)); }
function startTone(i){
  for(let j=0;j<6;j++) if(j!==i) stopTone(j);
  stopTone(i);
  const ctx=getCtx(),freq=midiToFreq(tunerMidis[i]);
  const mg=ctx.createGain(); mg.gain.setValueAtTime(0.5,ctx.currentTime);
  if(!tunerSustain) mg.gain.setTargetAtTime(0,ctx.currentTime+1.5,1.2);
  mg.connect(ctx.destination);
  const oscs=[];
  if(toneMode==='guitar'){[1,2,3,4,5].forEach((h,i2)=>{if(freq*h>20000)return;const g=ctx.createGain();g.gain.value=[1,.5,.25,.12,.06][i2];const o=ctx.createOscillator();o.frequency.value=freq*h;o.connect(g);g.connect(mg);o.start();oscs.push(o);});}else{const o=ctx.createOscillator();o.type='sine';o.frequency.value=freq;o.connect(mg);o.start();oscs.push(o);}
  const stopAt=tunerSustain?null:ctx.currentTime+6;
  activeTones[i]={oscs,masterGain:mg,stopAt};
  document.getElementById('str-'+i)?.classList.add('playing');
  if(!tunerSustain) setTimeout(()=>{if(activeTones[i]?.stopAt===stopAt)stopTone(i);},6100);
}
function stopTone(i){ const t=activeTones[i]; if(!t)return; const ctx=getCtx(); t.masterGain.gain.cancelScheduledValues(ctx.currentTime); t.masterGain.gain.setTargetAtTime(0,ctx.currentTime,0.03); setTimeout(()=>{t.oscs.forEach(o=>{try{o.stop();}catch{}});t.masterGain.disconnect();},200); activeTones[i]=null; document.getElementById('str-'+i)?.classList.remove('playing'); }
function stopAllTones(){ for(let i=0;i<6;i++)stopTone(i); }
function renderStrings(){ const row=document.getElementById('stringsRow'); row.innerHTML=''; tunerMidis.forEach((m,i)=>{ const freq=midiToFreq(m),note=NOTE_NAMES[m%12],oct=Math.floor(m/12)-1; const card=document.createElement('div'); card.className='string-card'+(activeTones[i]?' playing':''); card.id='str-'+i; card.innerHTML=`<div class="string-num">String ${6-i}</div><div class="string-note">${note}</div><div class="string-hz">${freq.toFixed(2)} Hz</div><div class="play-indicator">♪</div>`; card.addEventListener('click',()=>{ if(activeTones[i])stopTone(i);else startTone(i); }); row.appendChild(card); }); }
function renderCustomStrings(){ const c=document.getElementById('customStrings'); c.innerHTML=''; tunerMidis.forEach((m,i)=>{ const ni=m%12,oct=Math.floor(m/12)-1; const row=document.createElement('div'); row.className='custom-string-row'; const lbl=document.createElement('span'); lbl.className='string-name'; lbl.textContent=`String ${6-i}`; const nSel=document.createElement('select'); NOTE_NAMES.forEach((n,j)=>{const o=document.createElement('option');o.value=j;o.textContent=n;if(j===ni)o.selected=true;nSel.appendChild(o);}); const oSel=document.createElement('select'); for(let o=0;o<=7;o++){const op=document.createElement('option');op.value=o;op.textContent=o;if(o===oct)op.selected=true;oSel.appendChild(op);} const prev=document.createElement('span'); prev.className='hz-preview'; prev.textContent=midiToFreq(m).toFixed(2)+' Hz'; const upd=()=>{const nm=noteOctToMidi(+nSel.value,+oSel.value);tunerMidis[i]=nm;prev.textContent=midiToFreq(nm).toFixed(2)+' Hz';if(activeTones[i]){stopTone(i);startTone(i);}renderStrings();}; nSel.addEventListener('change',upd); oSel.addEventListener('change',upd); row.append(lbl,nSel,oSel,prev); c.appendChild(row); }); }
function renderSavedTunings(){ const c=document.getElementById('savedTunings'),e=document.getElementById('noSavedTunings'),keys=Object.keys(savedTunings); c.innerHTML=''; e.style.display=keys.length?'none':'block'; keys.forEach(name=>{ const chip=document.createElement('div'); chip.className='saved-tuning-chip'; chip.innerHTML=`<span>${name}</span><span class="del" title="Delete">✕</span>`; chip.querySelector('span:first-child').addEventListener('click',()=>{tunerMidis=[...savedTunings[name]];stopAllTones();renderStrings();renderCustomStrings();}); chip.querySelector('.del').addEventListener('click',e=>{e.stopPropagation();if(!confirm(`Delete "${name}"?`))return;delete savedTunings[name];persistTunings();renderSavedTunings();}); c.appendChild(chip); }); }
function initTuner(){
  loadSavedTunings();
  const pSel=document.getElementById('presetSelect'); Object.keys(PRESETS).forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;pSel.appendChild(o);}); pSel.addEventListener('change',()=>{tunerMidis=[...PRESETS[pSel.value]];stopAllTones();renderStrings();renderCustomStrings();});
  renderStrings(); renderCustomStrings(); renderSavedTunings();
  document.querySelectorAll('.tone-opt[data-mode]').forEach(el=>{ el.addEventListener('click',()=>{ toneMode=el.dataset.mode; document.querySelectorAll('.tone-opt[data-mode]').forEach(e=>e.classList.toggle('active',e===el)); stopAllTones(); }); });
  document.getElementById('sustainToggle').addEventListener('click',()=>{
    tunerSustain=!tunerSustain;
    document.getElementById('sustainToggle').classList.toggle('active',tunerSustain);
    if(!tunerSustain){
      const ctx=getCtx();
      for(let i=0;i<6;i++){const t=activeTones[i];if(t&&t.stopAt===null){t.masterGain.gain.setTargetAtTime(0,ctx.currentTime+1.5,1.2);const st=ctx.currentTime+6;t.stopAt=st;setTimeout(()=>{if(activeTones[i]?.stopAt===st)stopTone(i);},6100);}}
    }
  });
  document.getElementById('saveTuningBtn').addEventListener('click',()=>{ const name=document.getElementById('tuningNameInput').value.trim(); if(!name){alert('Enter a name.');return;} savedTunings[name]=[...tunerMidis]; persistTunings(); renderSavedTunings(); document.getElementById('tuningNameInput').value=''; });
  document.getElementById('exportTuningBtn').addEventListener('click',()=>{ const name=document.getElementById('tuningNameInput').value.trim()||'My Tuning'; const data={name,strings:tunerMidis.map(m=>({midi:m,note:midiToNote(m),freq:+midiToFreq(m).toFixed(2)}))}; const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); Object.assign(document.createElement('a'),{href:url,download:name+'.json'}).click(); setTimeout(()=>URL.revokeObjectURL(url),5000); });
}

// ═════════════════════════════════════════
// KNOB COMPONENT
// ═════════════════════════════════════════
function parseKnobInput(s, fmt, min, max){
  s=s.trim().toLowerCase();
  let v=parseFloat(s.replace(/[^\d.\-]/g,''));
  if(isNaN(v)) return null;
  if(fmt==='hz' && s.endsWith('k')) v*=1000;
  return Math.min(max,Math.max(min,v));
}

function initKnob(el, onChange) {
  const ring = el.querySelector('.knob-ring');
  const ind  = el.querySelector('.knob-indicator');
  const val  = el.querySelector('.knob-val');
  const min  = parseFloat(el.dataset.min);
  const max  = parseFloat(el.dataset.max);
  const def  = parseFloat(el.dataset.value);
  const log  = el.dataset.log === 'true';
  const fmt  = el.dataset.fmt || 'num';
  let cur = def, dragging = false, startY = 0, startNorm = 0;

  function norm(v){ return log ? (Math.log(v)-Math.log(min))/(Math.log(max)-Math.log(min)) : (v-min)/(max-min); }
  function denorm(n){ return log ? min*Math.pow(max/min,n) : min+n*(max-min); }

  function fmtVal(v){
    switch(fmt){
      case 'hz': return v>=1000?(v/1000).toFixed(1)+'k':v.toFixed(0)+'Hz';
      case 'ms': return v.toFixed(0)+'ms';
      case 'pct': return v.toFixed(0)+'%';
      case 'cents': return (v>=0?'+':'')+v.toFixed(0)+'¢';
      case 'q': return v.toFixed(1);
      case 'lfo': return v.toFixed(1)+'Hz';
      default: return v.toFixed(1);
    }
  }

  function set(v, fire=true){
    cur = Math.min(max, Math.max(min, v));
    const angle = norm(cur) * 270 - 135;
    ind.style.transform = `rotate(${angle}deg)`;
    val.textContent = fmtVal(cur);
    if(fire) onChange(cur);
  }

  set(def, false);

  const onStart = (y) => { dragging=true; startY=y; startNorm=norm(cur); el.classList.add('dragging'); };
  const onMove  = (y) => { if(!dragging) return; const n=Math.min(1,Math.max(0, startNorm+(startY-y)/150)); set(denorm(n)); };
  const onEnd   = ()  => { dragging=false; el.classList.remove('dragging'); };

  ring.addEventListener('mousedown', e => { onStart(e.clientY); e.preventDefault(); });
  window.addEventListener('mousemove', e => onMove(e.clientY));
  window.addEventListener('mouseup', onEnd);
  ring.addEventListener('touchstart', e => { onStart(e.touches[0].clientY); e.preventDefault(); }, {passive:false});
  window.addEventListener('touchmove', e => { if(dragging) onMove(e.touches[0].clientY); }, {passive:false});
  window.addEventListener('touchend', onEnd);
  ring.addEventListener('dblclick', () => set(def));

  val.addEventListener('click', e => {
    if(dragging) return;
    const inp=document.createElement('input');
    inp.type='text'; inp.className='knob-edit';
    inp.value=cur.toFixed(fmt==='pct'||fmt==='ms'||fmt==='cents'?0:fmt==='q'?2:2);
    val.replaceWith(inp); inp.focus(); inp.select();
    const commit=()=>{ const v=parseKnobInput(inp.value,fmt,min,max); inp.replaceWith(val); if(v!==null) set(v); };
    inp.addEventListener('blur',commit);
    inp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();commit();} if(e.key==='Escape') inp.replaceWith(val); });
    inp.addEventListener('mousedown',e=>e.stopPropagation());
  });

  return { get: () => cur, set };
}

// ═════════════════════════════════════════
// TONE GENERATOR
// ═════════════════════════════════════════
const toneInstances = [];
let masterAnalyser = null, scopeRAF = null;

function getMasterAnalyser(){
  if(!masterAnalyser){
    const ctx=getCtx();
    masterAnalyser=ctx.createAnalyser();
    masterAnalyser.fftSize=1024;
    masterAnalyser.connect(ctx.destination);
  }
  return masterAnalyser;
}

function makeToneState(){
  return {
    waveform:'sine', frequency:440, detune:0, volume:0.7, octave:0,
    osc2Wave:'square', osc2Detune:0, osc2Level:0, osc2Octave:-1,
    attack:0.01, decay:0.1, sustain:0.7, release:0.3,
    filterType:'lowpass', filterCutoff:4000, filterQ:1,
    distDrive:0, distMix:0, distType:'soft',
    delayTime:300, delayFeedback:30, delayMix:0,
    lfoRate:5, lfoDepth:0, lfoTarget:'pitch',
    osc:null, osc2:null, osc2LvGain:null, oscMix:null,
    envGain:null, volGain:null, filter:null,
    distNode:null, distDry:null, distWet:null,
    delayNode:null, delayFb:null, delayWet:null, delayDry:null,
    lfo:null, lfoGain:null,
    playing:false, _btn:null
  };
}

function makeDistCurve(amount, type){
  const n=256, c=new Float32Array(n), k=amount*2;
  for(let i=0;i<n;i++){
    const x=(i*2)/n-1;
    c[i]=type==='hard'?Math.max(-1,Math.min(1,x*(1+k))):((Math.PI+k)*x)/(Math.PI+k*Math.abs(x));
  }
  return c;
}

function osc1Freq(ts){ return ts.frequency*Math.pow(2,ts.octave); }
function osc2Freq(ts){ return ts.frequency*Math.pow(2,ts.octave+ts.osc2Octave); }

function toneStart(ts){
  toneStop(ts);
  const ctx=getCtx(), ana=getMasterAnalyser();

  // Osc 1
  ts.osc=ctx.createOscillator();
  ts.osc.type=ts.waveform; ts.osc.frequency.value=osc1Freq(ts); ts.osc.detune.value=ts.detune;

  // Osc 2
  ts.osc2=ctx.createOscillator();
  ts.osc2.type=ts.osc2Wave; ts.osc2.frequency.value=osc2Freq(ts); ts.osc2.detune.value=ts.osc2Detune;
  ts.osc2LvGain=ctx.createGain(); ts.osc2LvGain.gain.value=ts.osc2Level/100;

  ts.oscMix=ctx.createGain();
  ts.osc.connect(ts.oscMix);
  ts.osc2.connect(ts.osc2LvGain); ts.osc2LvGain.connect(ts.oscMix);

  // Filter
  ts.filter=ctx.createBiquadFilter();
  ts.filter.type=ts.filterType; ts.filter.frequency.value=ts.filterCutoff; ts.filter.Q.value=ts.filterQ;
  ts.oscMix.connect(ts.filter);

  // Distortion (dry/wet)
  ts.distNode=ctx.createWaveShaper();
  ts.distNode.curve=makeDistCurve(ts.distDrive,ts.distType); ts.distNode.oversample='4x';
  ts.distDry=ctx.createGain(); ts.distDry.gain.value=1-ts.distMix/100;
  ts.distWet=ctx.createGain(); ts.distWet.gain.value=ts.distMix/100;
  const distOut=ctx.createGain();
  ts.filter.connect(ts.distDry); ts.filter.connect(ts.distNode);
  ts.distNode.connect(ts.distWet);
  ts.distDry.connect(distOut); ts.distWet.connect(distOut);

  // Envelope
  ts.envGain=ctx.createGain();
  distOut.connect(ts.envGain);

  // Volume
  ts.volGain=ctx.createGain(); ts.volGain.gain.value=ts.volume;
  ts.envGain.connect(ts.volGain);

  // Delay (dry/wet)
  ts.delayNode=ctx.createDelay(3.0); ts.delayNode.delayTime.value=ts.delayTime/1000;
  ts.delayFb=ctx.createGain(); ts.delayFb.gain.value=Math.min(0.95,ts.delayFeedback/100);
  ts.delayWet=ctx.createGain(); ts.delayWet.gain.value=ts.delayMix/100;
  ts.delayDry=ctx.createGain(); ts.delayDry.gain.value=1-ts.delayMix/100;
  ts.volGain.connect(ts.delayDry);
  ts.volGain.connect(ts.delayNode);
  ts.delayNode.connect(ts.delayFb); ts.delayFb.connect(ts.delayNode);
  ts.delayNode.connect(ts.delayWet);
  ts.delayDry.connect(ana); ts.delayWet.connect(ana);

  // LFO
  ts.lfo=ctx.createOscillator(); ts.lfoGain=ctx.createGain();
  ts.lfo.frequency.value=ts.lfoRate; ts.lfoGain.gain.value=0;
  ts.lfo.connect(ts.lfoGain); toneApplyLFO(ts);

  // ADSR
  const now=ctx.currentTime;
  ts.envGain.gain.setValueAtTime(0,now);
  ts.envGain.gain.linearRampToValueAtTime(1,now+ts.attack);
  ts.envGain.gain.linearRampToValueAtTime(ts.sustain,now+ts.attack+ts.decay);

  ts.osc.start(); ts.osc2.start(); ts.lfo.start();
  ts.playing=true;
  if(ts._btn){ ts._btn.textContent='■ Stop'; ts._btn.classList.add('playing'); }
  if(!scopeRAF) drawScope();
}

function toneStop(ts){
  if(!ts.osc) return;
  const ctx=getCtx(), now=ctx.currentTime;
  ts.envGain.gain.cancelScheduledValues(now);
  ts.envGain.gain.setValueAtTime(ts.envGain.gain.value,now);
  ts.envGain.gain.linearRampToValueAtTime(0,now+ts.release);
  const snap={osc:ts.osc,osc2:ts.osc2,lfo:ts.lfo,dry:ts.delayDry,wet:ts.delayWet,rel:ts.release};
  setTimeout(()=>{
    [snap.osc,snap.osc2,snap.lfo].forEach(n=>{try{n.stop();}catch{}});
    [snap.dry,snap.wet].forEach(g=>{try{g.disconnect();}catch{}});
  },(snap.rel+0.05)*1000);
  ts.osc=null; ts.osc2=null; ts.lfo=null; ts.playing=false;
  if(ts._btn){ ts._btn.textContent='▶ Play'; ts._btn.classList.remove('playing'); }
  if(!toneInstances.some(t=>t.playing)){ cancelAnimationFrame(scopeRAF); scopeRAF=null; clearScope(); }
}

function toneApplyLFO(ts){
  if(!ts.lfoGain) return;
  try{ts.lfoGain.disconnect();}catch{}
  const d=ts.lfoDepth/100;
  if(ts.lfoTarget==='pitch'){ ts.lfoGain.gain.value=d*200; if(ts.osc) ts.lfoGain.connect(ts.osc.detune); }
  else if(ts.lfoTarget==='filter'){ ts.lfoGain.gain.value=d*ts.filterCutoff*0.8; if(ts.filter) ts.lfoGain.connect(ts.filter.frequency); }
  else { ts.lfoGain.gain.value=d*0.5; if(ts.envGain) ts.lfoGain.connect(ts.envGain.gain); }
}

function toneUpdate(ts){
  if(!ts.osc) return;
  ts.osc.type=ts.waveform; ts.osc.frequency.value=osc1Freq(ts); ts.osc.detune.value=ts.detune;
  ts.osc2.type=ts.osc2Wave; ts.osc2.frequency.value=osc2Freq(ts); ts.osc2.detune.value=ts.osc2Detune;
  ts.osc2LvGain.gain.value=ts.osc2Level/100;
  ts.filter.type=ts.filterType; ts.filter.frequency.value=ts.filterCutoff; ts.filter.Q.value=ts.filterQ;
  ts.distNode.curve=makeDistCurve(ts.distDrive,ts.distType);
  ts.distDry.gain.value=1-ts.distMix/100; ts.distWet.gain.value=ts.distMix/100;
  ts.delayNode.delayTime.value=ts.delayTime/1000;
  ts.delayFb.gain.value=Math.min(0.95,ts.delayFeedback/100);
  ts.delayWet.gain.value=ts.delayMix/100; ts.delayDry.gain.value=1-ts.delayMix/100;
  ts.volGain.gain.value=ts.volume;
  ts.lfo.frequency.value=ts.lfoRate;
  toneApplyLFO(ts);
}

// Scope
function drawScope(){
  const canvas=document.getElementById('tgScope');
  if(!canvas||!masterAnalyser) return;
  const ctx2d=canvas.getContext('2d'), W=canvas.width=canvas.offsetWidth, H=canvas.height;
  const data=new Float32Array(masterAnalyser.fftSize);
  masterAnalyser.getFloatTimeDomainData(data);
  ctx2d.clearRect(0,0,W,H);
  ctx2d.shadowBlur=10; ctx2d.shadowColor='#01cdfe';
  ctx2d.strokeStyle='rgba(1,205,254,0.5)'; ctx2d.lineWidth=2;
  ctx2d.beginPath();
  data.forEach((v,i)=>{const x=i/data.length*W,y=(1-(v+1)/2)*H;i===0?ctx2d.moveTo(x,y):ctx2d.lineTo(x,y);});
  ctx2d.stroke();
  ctx2d.shadowBlur=0; ctx2d.strokeStyle='#01cdfe'; ctx2d.lineWidth=1.5;
  ctx2d.beginPath();
  data.forEach((v,i)=>{const x=i/data.length*W,y=(1-(v+1)/2)*H;i===0?ctx2d.moveTo(x,y):ctx2d.lineTo(x,y);});
  ctx2d.stroke();
  if(toneInstances.some(t=>t.playing)) scopeRAF=requestAnimationFrame(drawScope);
}
function clearScope(){
  const canvas=document.getElementById('tgScope'); if(!canvas) return;
  const ctx2d=canvas.getContext('2d');
  canvas.width=canvas.offsetWidth; ctx2d.clearRect(0,0,canvas.width,canvas.height);
  ctx2d.strokeStyle='rgba(1,205,254,0.15)'; ctx2d.lineWidth=1;
  ctx2d.beginPath(); ctx2d.moveTo(0,canvas.height/2); ctx2d.lineTo(canvas.width,canvas.height/2); ctx2d.stroke();
}

// ─── Card builder ───
const WAVE_SVGS={
  sine:`<path d="M2,11 C6,11 6,3 11,3 C16,3 16,19 21,19 C26,19 26,3 31,3 C36,3 36,11 42,11"/>`,
  square:`<path d="M2,11 L2,3 L13,3 L13,19 L24,19 L24,3 L35,3 L35,11"/>`,
  sawtooth:`<path d="M2,19 L14,3 L14,19 L26,3 L26,19 L38,3"/>`,
  triangle:`<path d="M2,11 L11,3 L22,19 L33,3 L42,11"/>`,
};
const WAVE_LABELS={sine:'Sine',square:'Square',sawtooth:'Saw',triangle:'Triangle'};
const FTYPES=[['lowpass','LP'],['highpass','HP'],['bandpass','BP'],['notch','Notch']];

function knobHTML(label,param,min,max,value,fmt,log){
  return `<div class="knob" data-param="${param}" data-min="${min}" data-max="${max}" data-value="${value}" data-fmt="${fmt}"${log?' data-log="true"':''}>
    <div class="knob-ring"><div class="knob-indicator"></div></div>
    <div class="knob-lbl">${label}</div>
    <div class="knob-val"></div>
  </div>`;
}
function waveBtnsHTML(wave, scope){
  return Object.entries(WAVE_SVGS).map(([w,p])=>`
  <div class="wave-btn${w===wave?' active':''}" data-wave="${w}" data-scope="${scope}">
    <svg viewBox="0 0 44 22" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${p}</svg>
    <span>${WAVE_LABELS[w]}</span>
  </div>`).join('');
}
function octHTML(param, val){
  return `<div class="octave-stepper" data-param="${param}">
    <span class="oct-lbl">Oct</span>
    ${[-2,-1,0,1,2].map(n=>`<div class="oct-btn${n===val?' active':''}" data-oct="${n}">${n>0?'+'+n:n}</div>`).join('')}
  </div>`;
}

function buildToneCard(ts, idx){
  const card=document.createElement('div');
  card.className='tone-card';
  card.innerHTML=`
    <div class="tone-card-hdr">
      <span class="tone-card-name">Tone ${idx+1}</span>
      <button class="btn sm tone-play-btn">▶ Play</button>
      <button class="btn sm tone-reset-btn" title="Reset to defaults">↺ Reset</button>
      ${idx>0?'<button class="btn sm danger tone-rm-btn">✕ Remove</button>':''}
    </div>
    <div class="tone-card-body">
      <div class="synth-grid">

        <div class="synth-module">
          <h3>Oscillator 1</h3>
          <div class="wave-selector">${waveBtnsHTML(ts.waveform,'osc1')}</div>
          ${octHTML('octave',ts.octave)}
          <div class="knob-row">
            ${knobHTML('Freq','frequency',40,3000,ts.frequency,'hz',true)}
            ${knobHTML('Detune','detune',-100,100,ts.detune,'cents',false)}
            ${knobHTML('Volume','volume',0,100,ts.volume*100,'pct',false)}
          </div>
        </div>

        <div class="synth-module">
          <h3>Oscillator 2</h3>
          <div class="wave-selector">${waveBtnsHTML(ts.osc2Wave,'osc2')}</div>
          ${octHTML('osc2Octave',ts.osc2Octave)}
          <div class="knob-row">
            ${knobHTML('Detune','osc2Detune',-100,100,ts.osc2Detune,'cents',false)}
            ${knobHTML('Level','osc2Level',0,100,ts.osc2Level,'pct',false)}
          </div>
        </div>

        <div class="synth-module">
          <h3>Envelope</h3>
          <div class="knob-row">
            ${knobHTML('Attack','attack',1,2000,ts.attack*1000,'ms',true)}
            ${knobHTML('Decay','decay',1,2000,ts.decay*1000,'ms',true)}
            ${knobHTML('Sustain','sustain',0,100,ts.sustain*100,'pct',false)}
            ${knobHTML('Release','release',10,3000,ts.release*1000,'ms',true)}
          </div>
        </div>

        <div class="synth-module">
          <h3>Filter</h3>
          <div class="filter-type">
            ${FTYPES.map(([t,l])=>`<button class="ftype-btn${t===ts.filterType?' active':''}" data-ftype="${t}">${l}</button>`).join('')}
          </div>
          <div class="knob-row">
            ${knobHTML('Cutoff','filterCutoff',40,18000,ts.filterCutoff,'hz',true)}
            ${knobHTML('Reso','filterQ',0.1,20,ts.filterQ,'q',true)}
          </div>
        </div>

        <div class="synth-module">
          <h3>Distortion</h3>
          <div class="filter-type">
            <button class="ftype-btn${ts.distType==='soft'?' active':''}" data-dtype="soft">Soft</button>
            <button class="ftype-btn${ts.distType==='hard'?' active':''}" data-dtype="hard">Hard</button>
          </div>
          <div class="knob-row">
            ${knobHTML('Drive','distDrive',0,100,ts.distDrive,'pct',false)}
            ${knobHTML('Mix','distMix',0,100,ts.distMix,'pct',false)}
          </div>
        </div>

        <div class="synth-module">
          <h3>Delay</h3>
          <div class="knob-row">
            ${knobHTML('Time','delayTime',10,2000,ts.delayTime,'ms',true)}
            ${knobHTML('Fdbk','delayFeedback',0,95,ts.delayFeedback,'pct',false)}
            ${knobHTML('Mix','delayMix',0,100,ts.delayMix,'pct',false)}
          </div>
        </div>

        <div class="synth-module">
          <h3>LFO</h3>
          <div class="lfo-target">
            ${['pitch','filter','amp'].map(t=>`<button class="ltarget-btn${t===ts.lfoTarget?' active':''}" data-target="${t}">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}
          </div>
          <div class="knob-row">
            ${knobHTML('Rate','lfoRate',0.1,20,ts.lfoRate,'lfo',true)}
            ${knobHTML('Depth','lfoDepth',0,100,ts.lfoDepth,'pct',false)}
          </div>
        </div>

      </div>
    </div>`;

  ts._btn=card.querySelector('.tone-play-btn');
  ts._btn.addEventListener('click',()=>{ ts.playing?toneStop(ts):toneStart(ts); });

  card.querySelector('.tone-reset-btn').addEventListener('click',()=>{
    if(ts.playing) toneStop(ts);
    const i=toneInstances.indexOf(ts);
    const newTs=makeToneState(); toneInstances[i]=newTs;
    card.replaceWith(buildToneCard(newTs,i));
  });

  const rmBtn=card.querySelector('.tone-rm-btn');
  if(rmBtn) rmBtn.addEventListener('click',()=>{
    toneStop(ts);
    const i=toneInstances.indexOf(ts); if(i>=0) toneInstances.splice(i,1);
    card.remove();
    document.querySelectorAll('.tone-card-name').forEach((el,j)=>el.textContent=`Tone ${j+1}`);
  });

  card.querySelectorAll('.wave-btn').forEach(btn=>btn.addEventListener('click',()=>{
    const sc=btn.dataset.scope;
    card.querySelectorAll(`.wave-btn[data-scope="${sc}"]`).forEach(b=>b.classList.toggle('active',b===btn));
    if(sc==='osc1'){ ts.waveform=btn.dataset.wave; } else { ts.osc2Wave=btn.dataset.wave; }
    toneUpdate(ts);
  }));

  card.querySelectorAll('.oct-btn').forEach(btn=>btn.addEventListener('click',()=>{
    const st=btn.closest('.octave-stepper'), p=st.dataset.param, v=+btn.dataset.oct;
    st.querySelectorAll('.oct-btn').forEach(b=>b.classList.toggle('active',b===btn));
    ts[p]=v; toneUpdate(ts);
  }));

  card.querySelectorAll('.ftype-btn[data-ftype]').forEach(btn=>btn.addEventListener('click',()=>{
    card.querySelectorAll('.ftype-btn[data-ftype]').forEach(b=>b.classList.toggle('active',b===btn));
    ts.filterType=btn.dataset.ftype; toneUpdate(ts);
  }));
  card.querySelectorAll('.ftype-btn[data-dtype]').forEach(btn=>btn.addEventListener('click',()=>{
    card.querySelectorAll('.ftype-btn[data-dtype]').forEach(b=>b.classList.toggle('active',b===btn));
    ts.distType=btn.dataset.dtype; toneUpdate(ts);
  }));
  card.querySelectorAll('.ltarget-btn').forEach(btn=>btn.addEventListener('click',()=>{
    card.querySelectorAll('.ltarget-btn').forEach(b=>b.classList.toggle('active',b===btn));
    ts.lfoTarget=btn.dataset.target; toneApplyLFO(ts);
  }));

  card.querySelectorAll('.knob').forEach(el=>{
    const p=el.dataset.param;
    initKnob(el,v=>{
      switch(p){
        case 'frequency':     ts.frequency=v;    toneUpdate(ts); break;
        case 'detune':        ts.detune=v;        toneUpdate(ts); break;
        case 'volume':        ts.volume=v/100;    toneUpdate(ts); break;
        case 'osc2Detune':    ts.osc2Detune=v;   toneUpdate(ts); break;
        case 'osc2Level':     ts.osc2Level=v;     toneUpdate(ts); break;
        case 'attack':        ts.attack=v/1000;   break;
        case 'decay':         ts.decay=v/1000;    break;
        case 'sustain':       ts.sustain=v/100;   break;
        case 'release':       ts.release=v/1000;  break;
        case 'filterCutoff':  ts.filterCutoff=v;  toneUpdate(ts); break;
        case 'filterQ':       ts.filterQ=v;       toneUpdate(ts); break;
        case 'distDrive':     ts.distDrive=v;     toneUpdate(ts); break;
        case 'distMix':       ts.distMix=v;       toneUpdate(ts); break;
        case 'delayTime':     ts.delayTime=v;     toneUpdate(ts); break;
        case 'delayFeedback': ts.delayFeedback=v; toneUpdate(ts); break;
        case 'delayMix':      ts.delayMix=v;      toneUpdate(ts); break;
        case 'lfoRate':       ts.lfoRate=v;       toneUpdate(ts); break;
        case 'lfoDepth':      ts.lfoDepth=v;      toneApplyLFO(ts); break;
      }
    });
  });

  return card;
}

function addTone(){
  const ts=makeToneState(); toneInstances.push(ts);
  document.getElementById('tgTones').appendChild(buildToneCard(ts,toneInstances.length-1));
}

function initToneGen(){
  document.getElementById('tgAddTone').addEventListener('click',addTone);
  addTone();
  setTimeout(clearScope,100);
}

// ═════════════════════════════════════════
// TAB SWITCHING
// ═════════════════════════════════════════
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    const tab=btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b===btn));
    document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+tab));
    if(tab!=='tuner') stopAllTones();
    if(tab!=='tone') toneInstances.forEach(toneStop);
  });
});

// ═════════════════════════════════════════
// INIT
// ═════════════════════════════════════════
initBeatMachine();
initTuner();
initToneGen();
